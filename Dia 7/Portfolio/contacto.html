<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/fonts/fontawesome-free-6.1.2-web/css/all.min.css" />
    <link rel="stylesheet" href="assets/fonts/poppins/poppins.css" />
    <link rel="stylesheet" href="assets/css/reset.css"/>
    <link rel="stylesheet" href="assets/css/estilos.css" />
    <title>Portfolio</title>
</head>
<body>
    <div class="layout">
        <aside class="layout__aside">
            <section class="aside__user-info">
                <div class="user-info__general">
                    <div class="user-info__container-image">
                        <img src="assets/img/Foto.jpg" class="user-info__image" alt="Foto de perfil del usuario" />
                    </div>
                    <h2 class="user-info__name"> Celeste Jiménez </h2>
                    <h4 class="user-info__job">Estudiante</h4>
                </div>
                <nav class="layout__menu">
                    <ul class="menu__list">
                        <li class="menu__option">
                            <a href="index.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-house"></i>
                                <span class="menu__overly">Home</span>
                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="curriculum.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-graduation-cap"></i>
                                <span class="menu__overly">Curriculum</span>
                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="portfolio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-code"></i>
                                <span class="menu__overly">Portfolio</span>
                            </a>
                        </li>
                         <li class="menu__option">
                            <a href="contacto.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-user"></i>
                                <span class="menu__overly">Contacto</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="user-info__links">
                    <ul class="links__social">

                        <li class="social__option">
                            <a href="https://www.linkedin.com/in/celeste-jim%C3%A9nez/" class="social_link">
                                <i class="social__icon fa-brands fa-linkedin" ></i>
                            </a>
                        </li>

                        <li class="social__option">
                            <a href="mailto:celestejimenez102@gmail.com" class="social_link">
                                <i class="social__icon fa-solid fa-envelope" ></i>
                            </a>
                        </li>
                        <li class="social__option">
                            <a href="https://github.com/DevCele" class="social_link">
                                <i class="social__icon fa-brands fa-github" ></i>
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="user-info__buttons">
                    <a href="assets/docs/CV_Celeste_Jimenez.pdf" download="CV_Celeste_Jimenez" class="user-info_btn">Descargar CV</a>
                </div>
                <footer class="user-info__footer">
                    &copy; 2025 Celeste Jimenez 
                </footer>
            </section>
        </aside>

        <main class="layout__content">
            <section class="content__page content__about">
                <header class="about__header">
                    <h2 class="about__title">Contac<span class="title__color">to</span> </h2>
                </header>
                <form action="">
                    <div class="form__group">
                        <label for="name" class="form__label">Nombre:</label>
                        <input type="text" id="name" name="name" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="email" class="form__label">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="message" class="form__label">Mensaje:</label>
                        <textarea id="message" name="message" class="form__textarea" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="form__button">Enviar</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
