<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Infija</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <h1>Calculadora</h1>
    <div class="calculadora">
        <div id="display" class="display">0</div>
            <div class="teclas">
                <button class="tecla" id="limpiar">C</button>
                <button class="tecla" id="borrar">⌫</button>
                <button class="tecla operador" data-operador="/">÷</button>
                <button class="tecla operador" data-operador="*">×</button>
                

                <button class="tecla numero">7</button>
                <button class="tecla numero">8</button>
                <button class="tecla numero">9</button>
                <button class="tecla operador" data-operador="-">−</button>
                

                <button class="tecla numero">4</button>
                <button class="tecla numero">5</button>
                <button class="tecla numero">6</button>
                <button class="tecla operador" data-operador="+">+</button>
                
                
                <button class="tecla numero">1</button>
                <button class="tecla numero">2</button>
                <button class="tecla numero">3</button>
                <button class="tecla igual" id="igual">=</button>
                
                <button class="tecla numero cero">0</button>
                <button class="tecla" id="decimal">.</button>
            </div>
        </div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
